name: CI - Backend

on:
  pull_request:
    branches: [main, master]
    paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yml'

jobs:
  ci:
    name: Build, Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: beampay_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:password@localhost:5432/beampay_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret-not-for-production
      STELLAR_RPC_URL: https://soroban-testnet.stellar.org
      ALLBRIDGE_API_URL: https://core-api.allbridge.io
      RUN_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.81
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.81"
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build

      - name: Test
        run: cargo test
