name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobileapp/package-lock.json

      - name: Install AppleSimulatorUtils
        run: |
          brew update --preinstall
          brew install --formula applesimutils

      - name: Install dependencies
        working-directory: ./mobileapp
        run: npm ci

      - name: Detox Build
        working-directory: ./mobileapp
        run: npx detox build -c ios.sim.debug

      - name: Detox Test
        working-directory: ./mobileapp
        run: npx detox test -c ios.sim.debug --cleanup --headless
