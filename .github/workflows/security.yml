name: Security

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 6 * * 1' # Weekly Monday 06:00 UTC

jobs:
  # ─── Dependency audits ────────────────────────────────────────────────────────
  audit-backend:
    name: Cargo Audit (Backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit
        working-directory: ./backend
        run: cargo audit || true

  audit-contracts:
    name: Cargo Audit (Contracts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit
        working-directory: ./contracts
        run: cargo audit || true

  audit-frontend:
    name: NPM Audit (Frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./mobileapp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobileapp/package-lock.json
      - run: npm ci
      - name: Audit
        run: npm audit --audit-level=critical || true

  # ─── SAST – Semgrep ──────────────────────────────────────────────────────────
  semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    # Only run when SEMGREP_APP_TOKEN is configured
    if: vars.SEMGREP_APP_TOKEN != ''
    steps:
      - uses: actions/checkout@v4
      - uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/rust
            p/typescript
            p/secrets
            p/owasp-top-ten
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  # ─── Container scanning ───────────────────────────────────────────────────────
  trivy:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for scanning
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: true
          tags: beampay-backend:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: beampay-backend:scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ─── Secret scanning ─────────────────────────────────────────────────────────
  gitleaks:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            zricethezav/gitleaks:latest detect \
            --source=/repo \
            --config=/repo/.gitleaks.toml \
            --redact \
            --verbose \
            --no-git || true
